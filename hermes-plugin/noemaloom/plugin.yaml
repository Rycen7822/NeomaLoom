name: noemaloom
version: 0.1.0
description: "Native Hermes plugin for NoemaLoom span-first repository localization. Exposes six curated nl_* tools and a bundled noemaloom:usage skill; anchor repair/retire/checkpoint maintenance is available through the noemaloom CLI."
author: Rycen7822
kind: standalone
provides_tools:
  - nl_status
  - nl_refresh
  - nl_prepare_context
  - nl_plan_change
  - nl_verify_task
  - nl_anchor_manage
provides_hooks:
  - pre_llm_call
  - post_tool_call
